<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackBack UTHM - Report Found Item</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo-container" onclick="protectedNavigation('index.html')" style="cursor: pointer;">
            <div class="logo-icon">📍</div>
            <div class="logo-text">
                <h1>TrackBack UTHM</h1>
                <span>LOST & FOUND</span>
            </div>
        </div>
        
        <nav class="nav-links" id="mainNav">
            <a href="index.html" id="nav-home">Home</a>
            <a href="report-lost.html" id="nav-report-lost" onclick="return checkAccess(event, 'report-lost.html')">Report Lost Item</a>
            <a href="report-found.html" id="nav-report-found" class="active">Report Found Item</a>
            <a href="search.html" id="nav-search" onclick="return checkAccess(event, 'search.html')">Search & Filters</a>
            <a href="contact.html" id="nav-contact" onclick="return checkAccess(event, 'contact.html')">Contact Us</a>
            <a href="login.html" id="nav-auth-btn" class="btn-login-nav">Login</a>
        </nav>

        <div class="hamburger" id="hamburgerMenu" onclick="toggleMobileMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <div class="mobile-menu" id="mobileMenu">
        <a href="index.html" id="mobile-home">Home</a>
        <a href="report-lost.html" id="mobile-report-lost" onclick="return checkAccess(event, 'report-lost.html')">Report Lost Item 🔒</a>
        <a href="report-found.html" id="mobile-report-found" onclick="return checkAccess(event, 'report-found.html')">Report Found Item 🔒</a>
        <a href="search.html" id="mobile-search" onclick="return checkAccess(event, 'search.html')">Search & Filters 🔒</a>
        <a href="contact.html" id="mobile-contact" onclick="return checkAccess(event, 'contact.html')">Contact Us 🔒</a>
        <a href="login.html" id="mobile-auth-btn">Login</a>
    </div>

    <main class="container">
        <section id="report-found-page" class="page active-page">
            <div class="form-wrapper">
                <span class="form-subtitle">REPORT FORM</span>
                <h2 class="form-title">Report Found Item</h2>
                
                <form onsubmit="event.preventDefault(); alert('Found report submitted successfully!'); window.location.href='index.html';">
                    <div class="form-step active-step" id="found-step-1">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Item Name</label>
                                <input type="text" placeholder="Example: Keys, bottle, wallet...">
                            </div>
                            <div class="form-group">
                                <label>Found Location</label>
                                <input type="text" placeholder="Where was it found?">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Item Details</label>
                            <textarea rows="4" placeholder="Add identifying details without revealing private information..."></textarea>
                        </div>
                        <div class="wizard-navigation">
                            <button type="button" class="btn-nav btn-back" onclick="window.location.href='index.html'">Back to Home</button>
                            <button type="button" class="btn-nav btn-next" onclick="switchStep('found-step-1', 'found-step-2')">Next Step →</button>
                        </div>
                    </div>

                    <div class="form-step" id="found-step-2">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Contact Details</label>
                                <input type="text" placeholder="Email or phone number">
                            </div>
                            <div class="form-group">
                                <label>Upload Item Image</label>
                                <input type="file" class="file-input">
                            </div>
                        </div>
                        <div class="wizard-navigation">
                            <button type="button" class="btn-nav btn-back" onclick="switchStep('found-step-2', 'found-step-1')">← Back</button>
                            <button type="submit" class="btn-submit">Submit Found Report</button>
                        </div>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer-bar">
        <div class="footer-left">
            <a href="#terms">Terms & Support</a>
            <a href="#privacy">Privacy Policy</a>
        </div>
        <div class="footer-right">
            Design with ♡ for BIW20303 Web Design
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
